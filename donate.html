<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تبرع - قصة قبيلة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sand: { 50: '#FFF8F0', 100: '#FFEED5', 200: '#FDDBA8', 300: '#F5C678', 400: '#E8AD4A', 500: '#D4942E', 600: '#B07820' },
            desert: { 50: '#FDF6EE', 100: '#F5E6D0', 200: '#E8CDA0', 300: '#D4A870', 400: '#C08A50', 500: '#A06E38', 600: '#7A5239', 700: '#5C3D2B', 800: '#3E2A1D', 900: '#221510' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-sand-50 text-desert-800">

  <header class="bg-white shadow-sm border-b border-sand-100 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-desert-700">🏕️ قصة قبيلة</a>
      <a href="/#chapters" class="text-sm text-desert-500 hover:text-desert-700">← الفصول</a>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-12">

    <h1 class="text-3xl font-bold text-center mb-4">💖 تبرع للكاتب</h1>
    <p class="text-center text-desert-500 mb-8">إذا أعجبتك قصة قبيلة، يمكنك دعم الكاتب بأي مبلغ. كل التبرعات تساعد على استمرار الكتابة وشكراً لك!</p>

    <div class="bg-white rounded-2xl shadow-sm border border-sand-100 p-8 text-center">
      <p class="text-desert-700 mb-6 text-lg">اختر المبلغ الذي تريد التبرع به</p>
      <a href="https://www.paypal.com/ncp/payment/KZTZ8EJ732858" 
         class="inline-block bg-[#0070BA] text-white px-10 py-4 rounded-full text-lg font-semibold hover:bg-[#003D7A] transition shadow-md">
        💖 تبرع عبر PayPal
      </a>
      <p class="text-xs text-desert-400 mt-4">يمكنك تحديد المبلغ بنفسك بعد الضغط على الرابط</p>
    </div>

  </main>

  <footer class="bg-white border-t border-sand-100 py-8 text-center text-desert-400 text-sm">
    <p>© 2026 قصة قبيلة</p>
  </footer>

</body>
</html>
